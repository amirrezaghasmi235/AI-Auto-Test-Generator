name: AI Automated Testing Pipeline

on:
  push:
    branches: [ "main", "master" ]

jobs:
  ai-test-generation:
    runs-on: ubuntu-latest 

    steps:
    - name: 1. Checkout Code
      uses: actions/checkout@v4

    - name: 2. Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 3. Install Python Dependencies
      run: pip install openai coverage

    - name: 4. Generate Tests via ChatGPT API
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: python prompt_framework.py

    - name: 5. Evaluate Generated Tests
      run: python evaluate_tests.py

    - name: 6. Save Final Results
      uses: actions/upload-artifact@v4
      with:
        name: final-chatgpt-reports
        path: |
          evaluation_summary.json
          generated_tests/
