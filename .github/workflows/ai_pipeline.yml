name: AI Automated Testing Pipeline

on:
  push:
    branches: [ "main", "master" ]

jobs:
  ai-test-generation:
    runs-on: ubuntu-latest 

    steps:
    - name: 1. Checkout Code
      uses: actions/checkout@v4

    - name: 2. Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 3. Install Python Dependencies
      run: |
        pip install ollama coverage

    - name: 4. Install and Start Ollama (Background Service)
      run: |
        curl -fsSL https://ollama.com/install.sh | sh
        ollama serve &
        sleep 10
        ollama pull qwen2.5-coder:0.5b

    - name: 5. Generate Tests via AI
      run: python prompt_framework.py

    - name: 6. Evaluate Generated Tests
      run: python evaluate_tests.py

    - name: 7. Save Results and Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ai-evaluation-reports
        path: |
          evaluation_summary.json
          generated_tests/
